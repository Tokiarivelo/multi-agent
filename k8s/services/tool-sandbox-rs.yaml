apiVersion: v1
kind: Service
metadata:
  name: tool-sandbox-rs
  namespace: multi-agent
  labels:
    app: tool-sandbox-rs
spec:
  type: ClusterIP
  ports:
    - port: 3006
      targetPort: 3006
      protocol: TCP
      name: http
  selector:
    app: tool-sandbox-rs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-sandbox-rs
  namespace: multi-agent
  labels:
    app: tool-sandbox-rs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-sandbox-rs
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tool-sandbox-rs
    spec:
      containers:
        - name: tool-sandbox-rs
          image: tool-sandbox-rs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3006
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: multi-agent-config
            - secretRef:
                name: multi-agent-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3006"
            # Service dependencies
            - name: DOCUMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: multi-agent-config
                  key: DOCUMENT_SERVICE_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: multi-agent-secrets
                  key: DATABASE_URL
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tool-sandbox-rs-hpa
  namespace: multi-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tool-sandbox-rs
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
